  <path d="M1188 442 H1396" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <rect x="1244" y="420" width="138" height="42" rx="21" fill="#111318" stroke="#8d75ff" stroke-width="2"/>
