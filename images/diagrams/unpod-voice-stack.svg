<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 460" width="900" height="460">
  <style>text { font-family: 'Courier New', Courier, monospace; }</style>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4d4"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#00d4d4"/>
    </marker>
    <marker id="arr-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arr-pr" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="13" letter-spacing="3">UNPOD VOICE STACK</text>

  <!-- Column headers -->
  <text x="110" y="65" text-anchor="middle" fill="#6b7a90" font-size="9" letter-spacing="2">USER ENTRYPOINTS</text>
  <text x="450" y="65" text-anchor="middle" fill="#6b7a90" font-size="9" letter-spacing="2">UNPOD MANAGED LAYER</text>
  <text x="800" y="65" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="2">YOUR AGENT</text>

  <!-- Left group border -->
  <rect x="20" y="75" width="180" height="340" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Center group border -->
  <rect x="260" y="75" width="380" height="340" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Right group border -->
  <rect x="700" y="75" width="180" height="340" rx="6" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Left: PHONE, BROWSER, MOBILE -->
  <rect x="45" y="110" width="130" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="110" y="139" text-anchor="middle" fill="#fff" font-size="10" letter-spacing="1">PHONE</text>

  <rect x="45" y="205" width="130" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="110" y="234" text-anchor="middle" fill="#fff" font-size="10" letter-spacing="1">BROWSER</text>

  <rect x="45" y="300" width="130" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="110" y="329" text-anchor="middle" fill="#fff" font-size="10" letter-spacing="1">MOBILE</text>

  <!-- Center: PSTN/WEBRTC, STT+VAD, ORCHESTRATOR, TTS+STREAMING -->
  <rect x="290" y="110" width="150" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="365" y="132" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">PSTN /</text>
  <text x="365" y="147" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">WEBRTC</text>

  <rect x="290" y="190" width="150" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="365" y="212" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">STT + VAD</text>

  <rect x="290" y="270" width="150" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="365" y="299" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">ORCHESTRATOR</text>

  <rect x="290" y="350" width="150" height="48" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="365" y="372" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">TTS +</text>
  <text x="365" y="387" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">STREAMING</text>

  <!-- Right: AGENTRUNNER, DIALOG MACHINE, TOOLS/APIS -->
  <rect x="720" y="110" width="140" height="48" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="790" y="132" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">AGENT</text>
  <text x="790" y="147" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">RUNNER</text>

  <rect x="720" y="205" width="140" height="48" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="790" y="227" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">DIALOG</text>
  <text x="790" y="242" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">MACHINE</text>

  <rect x="720" y="300" width="140" height="48" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="790" y="322" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">TOOLS /</text>
  <text x="790" y="337" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">APIS</text>

  <!-- ARROWS: Left ↔ Center (audio in/out) -->
  <!-- PHONE → PSTN/WEBRTC (audio in) -->
  <path id="pa_in" d="M 176,125 L 289,125" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="232" y="120" text-anchor="middle" fill="#6b7a90" font-size="7">audio in</text>

  <!-- PSTN/WEBRTC → PHONE (audio out) -->
  <path id="pa_out" d="M 289,148 L 176,148" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr-r)"/>
  <text x="232" y="162" text-anchor="middle" fill="#6b7a90" font-size="7">audio out</text>

  <!-- BROWSER → PSTN (audio in) -->
  <path id="pb_in" d="M 176,218 L 289,218" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="232" y="213" text-anchor="middle" fill="#6b7a90" font-size="7">audio in</text>

  <!-- PSTN → BROWSER (audio out) -->
  <path id="pb_out" d="M 289,240 L 176,240" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr-r)"/>
  <text x="232" y="254" text-anchor="middle" fill="#6b7a90" font-size="7">audio out</text>

  <!-- MOBILE → ORCHESTRATOR (audio in) -->
  <path id="pc_in" d="M 176,314 L 289,314" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="232" y="309" text-anchor="middle" fill="#6b7a90" font-size="7">audio in</text>

  <!-- ORCHESTRATOR → MOBILE (audio out) -->
  <path id="pc_out" d="M 289,334 L 176,334" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr-r)"/>
  <text x="232" y="348" text-anchor="middle" fill="#6b7a90" font-size="7">audio out</text>

  <!-- ARROWS: Center ↔ Right (text turn / reply text) -->
  <!-- STT+VAD → AGENTRUNNER (text turn) -->
  <path id="pd_tt" d="M 441,210 L 719,134" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="590" y="165" text-anchor="middle" fill="#6b7a90" font-size="7">text turn</text>

  <!-- AGENTRUNNER → STT+VAD (reply text) -->
  <path id="pd_rt" d="M 719,145 L 441,225" stroke="#00d4d4" stroke-width="1.3" fill="none" marker-end="url(#arr)"/>
  <text x="590" y="205" text-anchor="middle" fill="#6b7a90" font-size="7">reply text</text>

  <!-- ORCHESTRATOR → DIALOG MACHINE (text turn) -->
  <path id="pe_tt" d="M 441,294 L 719,224" stroke="#a78bfa" stroke-width="1.3" fill="none" marker-end="url(#arr-p)"/>
  <text x="590" y="252" text-anchor="middle" fill="#8b7fa0" font-size="7">text turn</text>

  <!-- DIALOG MACHINE → ORCHESTRATOR (reply text) -->
  <path id="pe_rt" d="M 719,235 L 441,310" stroke="#a78bfa" stroke-width="1.3" fill="none" marker-end="url(#arr-p)"/>
  <text x="590" y="292" text-anchor="middle" fill="#8b7fa0" font-size="7">reply text</text>

  <!-- ANIMATED DOTS -->
  <!-- audio in: Left → Center -->
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#pa_in"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s"><mpath xlink:href="#pa_in"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.2s"><mpath xlink:href="#pb_in"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.4s"><mpath xlink:href="#pc_in"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>

  <!-- audio out: Center → Left -->
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1s"><mpath xlink:href="#pa_out"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.2s"><mpath xlink:href="#pb_out"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.4s"><mpath xlink:href="#pc_out"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>

  <!-- text turn: Center → Right (cyan) -->
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.3s"><mpath xlink:href="#pd_tt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.5s"><mpath xlink:href="#pd_tt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <!-- reply text: Center ← Right (cyan) -->
  <circle r="3.5" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#pd_rt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- text turn: Center → Right (purple) -->
  <circle r="3.5" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.6s"><mpath xlink:href="#pe_tt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle r="3.5" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.8s"><mpath xlink:href="#pe_tt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="1.8s"/>
  </circle>

  <!-- reply text: Center ← Right (purple) -->
  <circle r="3.5" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" begin="1.1s"><mpath xlink:href="#pe_rt"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2.5s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
</svg>