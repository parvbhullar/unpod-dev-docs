<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 320" width="900" height="320">
  <style>text { font-family: 'Courier New', Courier, monospace; }</style>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4d4"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="13" letter-spacing="3">UNPOD FOUR PILLARS</text>

  <!-- Pillar 1: COMMUNICATION INFRA -->
  <rect x="22" y="65" width="185" height="195" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="115" y="85" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="2">COMMUNICATION INFRA</text>
  <!-- unpod logo placeholder (large rect) -->
  <rect x="52" y="100" width="125" height="90" rx="4" fill="#0f0f1a" stroke="#00d4d4" stroke-width="1"/>
  <text x="115" y="150" text-anchor="middle" fill="#00d4d4" font-size="16" letter-spacing="2">unpod</text>
  <text x="115" y="238" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="1">PHONE NUMBERS + SIP</text>

  <!-- Pillar 2: VOICE STACK -->
  <rect x="232" y="65" width="175" height="195" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="320" y="85" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="2">VOICE STACK</text>
  <rect x="257" y="100" width="125" height="90" rx="4" fill="#0f0f1a" stroke="#00d4d4" stroke-width="1"/>
  <text x="320" y="150" text-anchor="middle" fill="#00d4d4" font-size="16" letter-spacing="2">unpod</text>
  <text x="320" y="238" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="1">STT + TTS + VAD</text>

  <!-- Pillar 3: CONVERSATION FRAMEWORK -->
  <rect x="432" y="65" width="195" height="195" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="530" y="85" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="1">CONVERSATION FRAMEWORK</text>
  <rect x="462" y="100" width="135" height="90" rx="4" fill="#0f0f1a" stroke="#00d4d4" stroke-width="1"/>
  <text x="530" y="150" text-anchor="middle" fill="#a78bfa" font-size="11" letter-spacing="2">SUPERDIALOG</text>
  <text x="530" y="238" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="1">FLOW GRAPHS + TOOLS</text>

  <!-- Pillar 4: CPAAS PLATFORM -->
  <rect x="652" y="65" width="225" height="195" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="765" y="85" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="2">CPAAS PLATFORM</text>
  <rect x="692" y="100" width="145" height="90" rx="4" fill="#0f0f1a" stroke="#00d4d4" stroke-width="1"/>
  <text x="765" y="143" text-anchor="middle" fill="#00d4d4" font-size="11" letter-spacing="2">OPEN</text>
  <text x="765" y="161" text-anchor="middle" fill="#00d4d4" font-size="11" letter-spacing="2">SOURCE</text>
  <text x="765" y="238" text-anchor="middle" fill="#6b7a90" font-size="7" letter-spacing="1">STUDIO + ANALYTICS</text>

  <!-- Arrows between pillars -->
  <path id="p1" d="M 208,162 L 231,162" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path id="p2" d="M 408,162 L 431,162" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path id="p3" d="M 628,162 L 651,162" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ANIMATED DOTS -->
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1s"><mpath xlink:href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.2s"><mpath xlink:href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.2s"><mpath xlink:href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.4s"><mpath xlink:href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.4s"><mpath xlink:href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.88;1" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>
</svg>