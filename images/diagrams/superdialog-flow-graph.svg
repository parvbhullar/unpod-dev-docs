<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="SUPERDIALOG FLOW GRAPH">
  <defs>
    <pattern id="hatch" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#1a1d22" stroke-width="3" opacity="0.7"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8d75ff"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d8e8"/>
    </marker>
    <style>
      svg { background: #020303; }
      .title { font: 700 44px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 9px; }
      .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 3px; }
      .small { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 2px; }
      .tiny { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 1px; }
      .panel { fill: url(#hatch); stroke: #4a4d55; stroke-width: 2; }
      .box { fill: #020303; stroke: #4a4d55; stroke-width: 2.5; }
      .purple { stroke: #8d75ff; }
      .cyan { stroke: #00d8e8; }
      .purpleText { fill: #8d75ff; }
      .cyanText { fill: #00d8e8; }
      .flow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 14 22; animation: dash 1.8s linear infinite; }
      .flow.fast { animation-duration: 1.35s; }
      .flow.slow { animation-duration: 2.4s; }
      .dim { opacity: 0.72; }
      .pulse { filter: url(#glow); animation: pulse 1.7s ease-in-out infinite; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -36; } }
      @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .flow, .pulse { animation: none; }
      }
    </style>
  </defs>
  <rect width="1672" height="941" fill="#020303"/>
  <text x="836" y="70" text-anchor="middle" class="title">SUPERDIALOG FLOW GRAPH</text>
  
  <rect x="48" y="330" width="178" height="112" rx="16" class="box purple "/>
  <text x="137" y="394" text-anchor="middle" class="label">
    <tspan x="137" dy="0">GREET</tspan>
  </text>
  <rect x="404" y="316" width="218" height="140" rx="16" class="box purple "/>
  <text x="513" y="379" text-anchor="middle" class="label">
    <tspan x="513" dy="0">COLLECT</tspan>
    <tspan x="513" dy="30">DETAILS</tspan>
  </text>
  <rect x="804" y="316" width="220" height="140" rx="16" class="box cyan "/>
  <text x="914" y="379" text-anchor="middle" class="label">
    <tspan x="914" dy="0">CHECK</tspan>
    <tspan x="914" dy="30">AVAILABILITY</tspan>
  </text>
  <rect x="1184" y="330" width="160" height="112" rx="16" class="box cyan "/>
  <text x="1264" y="394" text-anchor="middle" class="label">
    <tspan x="1264" dy="0">CONFIRM</tspan>
  </text>
  <rect x="1490" y="330" width="136" height="112" rx="16" class="box cyan "/>
  <text x="1558" y="394" text-anchor="middle" class="label">
    <tspan x="1558" dy="0">DONE</tspan>
  </text>
  <path d="M226 386 H394" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M622 386 H794" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M1024 386 H1174" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M1344 386 H1480" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M514 456 C514 566 456 566 456 456" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M914 456 C914 580 562 580 562 456" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <text x="306" y="352" text-anchor="middle" class="tiny purpleText">
    <tspan x="306" dy="0">ready</tspan>
  </text>
  <text x="704" y="350" text-anchor="middle" class="tiny purpleText">
    <tspan x="704" dy="0">details provided</tspan>
  </text>
  <text x="1100" y="350" text-anchor="middle" class="tiny cyanText">
    <tspan x="1100" dy="0">slot available</tspan>
  </text>
  <text x="1416" y="350" text-anchor="middle" class="tiny cyanText">
    <tspan x="1416" dy="0">confirmed</tspan>
  </text>
  <text x="480" y="610" text-anchor="middle" class="tiny purpleText">
    <tspan x="480" dy="0">missing info</tspan>
  </text>
  <text x="718" y="606" text-anchor="middle" class="tiny cyanText">
    <tspan x="718" dy="0">try another time</tspan>
  </text>
  <rect x="1254" y="720" width="380" height="144" rx="14" fill="none" stroke="#4a4d55" stroke-width="2" stroke-dasharray="8 8"/>
  <rect x="1282" y="742" width="90" height="40" rx="10" fill="#020303" stroke="#8d75ff" stroke-width="2"/>
  <text x="1510" y="770" text-anchor="middle" class="small">
    <tspan x="1510" dy="0">NODE = STATE</tspan>
  </text>
  <path d="M1284 822 H1364" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <text x="1510" y="830" text-anchor="middle" class="small">
    <tspan x="1510" dy="0">EDGE = CONDITION</tspan>
  </text>

</svg>
