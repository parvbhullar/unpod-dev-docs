  <path d="M858 394 H958" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M1268 404 H1372" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
