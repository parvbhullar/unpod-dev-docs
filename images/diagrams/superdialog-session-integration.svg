<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 360" width="900" height="360">
  <style>text { font-family: 'Courier New', Courier, monospace; }</style>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4d4"/>
    </marker>
    <marker id="arr-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#0a0a0a"/>
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="13" letter-spacing="3">SUPERDIALOG + SESSION</text>

  <!-- VOICE STACK group (left): x=85 y=80 w=165 h=200 -->
  <rect x="85" y="80" width="165" height="200" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="167" y="98" text-anchor="middle" fill="#6b7a90" font-size="8" letter-spacing="1">VOICE STACK</text>

  <!-- STT box inside left VOICE STACK group -->
  <rect x="115" y="155" width="105" height="40" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="167" y="180" text-anchor="middle" fill="#fff" font-size="10" letter-spacing="1">STT</text>

  <!-- SUPERDIALOG group (center) -->
  <rect x="340" y="80" width="220" height="200" rx="6" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="98" text-anchor="middle" fill="#a78bfa" font-size="8" letter-spacing="1">SUPERDIALOG</text>

  <!-- DIALOGMACHINE.TURN box inside SUPERDIALOG -->
  <rect x="365" y="145" width="170" height="45" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="165" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">DIALOGMACHINE</text>
  <text x="450" y="180" text-anchor="middle" fill="#a78bfa" font-size="9" letter-spacing="1">.TURN</text>

  <!-- VOICE STACK group (right): x=650 y=80 w=165 h=200 -->
  <rect x="650" y="80" width="165" height="200" rx="6" fill="none" stroke="#00d4d4" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="732" y="98" text-anchor="middle" fill="#6b7a90" font-size="8" letter-spacing="1">VOICE STACK</text>

  <!-- TTS box inside right VOICE STACK group -->
  <rect x="680" y="155" width="105" height="40" rx="4" fill="none" stroke="#00d4d4" stroke-width="1.5"/>
  <text x="732" y="180" text-anchor="middle" fill="#fff" font-size="10" letter-spacing="1">TTS</text>

  <!-- HOOK: USER_TURN (dashed vertical, above left section) -->
  <line x1="252" y1="78" x2="252" y2="120" stroke="#6b7a90" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="252" y="73" text-anchor="middle" fill="#6b7a90" font-size="8">HOOK: USER_TURN</text>

  <!-- HOOK: AGENT_TURN (dashed vertical, above right section) -->
  <line x1="648" y1="78" x2="648" y2="120" stroke="#6b7a90" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="648" y="73" text-anchor="middle" fill="#6b7a90" font-size="8">HOOK: AGENT_TURN</text>

  <!-- External labels: USER SPEAKS, CALLER HEARS -->
  <text x="30" y="178" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">USER</text>
  <text x="30" y="191" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">SPEAKS</text>

  <text x="868" y="178" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">CALLER</text>
  <text x="868" y="191" text-anchor="middle" fill="#fff" font-size="9" letter-spacing="1">HEARS</text>

  <!-- Arrow paths -->
  <!-- USER SPEAKS → STT -->
  <path id="p1" d="M 52,175 L 114,175" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- STT → USER TEXT (to SUPERDIALOG) -->
  <path id="p2" d="M 221,175 L 364,175" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="292" y="168" text-anchor="middle" fill="#6b7a90" font-size="8">USER TEXT</text>

  <!-- DIALOGMACHINE → AGENT REPLY -->
  <path id="p3" d="M 536,175 L 649,175" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arr-p)"/>
  <text x="592" y="168" text-anchor="middle" fill="#8b7fa0" font-size="8">AGENT REPLY</text>

  <!-- TTS → CALLER HEARS -->
  <path id="p4" d="M 786,175 L 848,175" stroke="#00d4d4" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ANIMATED DOTS -->
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.5s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.75s"><mpath xlink:href="#p1"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.5s" repeatCount="indefinite" begin="0.75s"/>
  </circle>

  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.2s"><mpath xlink:href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.2s"><mpath xlink:href="#p2"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <circle r="4" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.5s"><mpath xlink:href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle r="4" fill="#a78bfa" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.5s"><mpath xlink:href="#p3"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#p4"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="4" fill="#00d4d4" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite" begin="1.55s"><mpath xlink:href="#p4"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.5s" repeatCount="indefinite" begin="1.55s"/>
  </circle>
</svg>