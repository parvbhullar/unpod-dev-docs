<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="SUPERDIALOG + SESSION">
  <defs>
    <pattern id="hatch" width="16" height="16" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="16" stroke="#1a1d22" stroke-width="3" opacity="0.7"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8d75ff"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d8e8"/>
    </marker>
    <style>
      svg { background: #020303; }
      .title { font: 700 44px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 9px; }
      .label { font: 700 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f0f0f0; letter-spacing: 3px; }
      .small { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 2px; }
      .tiny { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a8abb4; letter-spacing: 1px; }
      .panel { fill: url(#hatch); stroke: #4a4d55; stroke-width: 2; }
      .box { fill: #020303; stroke: #4a4d55; stroke-width: 2.5; }
      .purple { stroke: #8d75ff; }
      .cyan { stroke: #00d8e8; }
      .purpleText { fill: #8d75ff; }
      .cyanText { fill: #00d8e8; }
      .flow { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 14 22; animation: dash 1.8s linear infinite; }
      .flow.fast { animation-duration: 1.35s; }
      .flow.slow { animation-duration: 2.4s; }
      .dim { opacity: 0.72; }
      .pulse { filter: url(#glow); animation: pulse 1.7s ease-in-out infinite; transform-origin: center; }
      @keyframes dash { to { stroke-dashoffset: -36; } }
      @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .flow, .pulse { animation: none; }
      }
    </style>
  </defs>
  <rect width="1672" height="941" fill="#020303"/>
  <text x="836" y="70" text-anchor="middle" class="title">SUPERDIALOG + SESSION</text>
  
  <rect x="28" y="436" width="172" height="112" rx="12" class="box "/>
  <text x="114" y="483" text-anchor="middle" class="small">
    <tspan x="114" dy="0">USER</tspan>
    <tspan x="114" dy="30">SPEAKS</tspan>
  </text>
  <rect x="244" y="374" width="224" height="256" rx="18" class="panel cyan"/>
  <text x="356" y="418" text-anchor="middle" class="label cyanText">
    <tspan x="356" dy="0">VOICE STACK</tspan>
  </text>
  <rect x="268" y="452" width="176" height="120" rx="16" class="box cyan "/>
  <text x="356" y="520" text-anchor="middle" class="label">
    <tspan x="356" dy="0">STT</tspan>
  </text>
  <rect x="508" y="436" width="170" height="112" rx="12" class="box "/>
  <text x="593" y="498" text-anchor="middle" class="small">
    <tspan x="593" dy="0">USER TEXT</tspan>
  </text>
  <rect x="720" y="374" width="272" height="256" rx="18" class="panel purple"/>
  <text x="856" y="418" text-anchor="middle" class="label purpleText">
    <tspan x="856" dy="0">SUPERDIALOG</tspan>
  </text>
  <rect x="736" y="452" width="240" height="120" rx="16" class="box purple "/>
  <text x="856" y="490" text-anchor="middle" class="label">
    <tspan x="856" dy="0">DIALOG</tspan>
    <tspan x="856" dy="30">MACHINE</tspan>
    <tspan x="856" dy="30">TURN</tspan>
  </text>
  <rect x="1032" y="436" width="170" height="112" rx="12" class="box "/>
  <text x="1117" y="483" text-anchor="middle" class="small">
    <tspan x="1117" dy="0">AGENT</tspan>
    <tspan x="1117" dy="30">REPLY</tspan>
  </text>
  <rect x="1236" y="374" width="222" height="256" rx="18" class="panel cyan"/>
  <text x="1347" y="418" text-anchor="middle" class="label cyanText">
    <tspan x="1347" dy="0">VOICE STACK</tspan>
  </text>
  <rect x="1260" y="452" width="174" height="120" rx="16" class="box cyan "/>
  <text x="1347" y="520" text-anchor="middle" class="label">
    <tspan x="1347" dy="0">TTS</tspan>
  </text>
  <rect x="1474" y="436" width="170" height="112" rx="12" class="box "/>
  <text x="1559" y="483" text-anchor="middle" class="small">
    <tspan x="1559" dy="0">CALLER</tspan>
    <tspan x="1559" dy="30">HEARS</tspan>
  </text>
  <rect x="450" y="254" width="288" height="44" rx="22" fill="#111318" stroke="#00d8e8" stroke-width="2"/>
  <text x="594" y="282" text-anchor="middle" class="small cyanText">
    <tspan x="594" dy="0">HOOK: USER_TURN</tspan>
  </text>
  <rect x="978" y="254" width="288" height="44" rx="22" fill="#111318" stroke="#00d8e8" stroke-width="2"/>
  <text x="1122" y="282" text-anchor="middle" class="small cyanText">
    <tspan x="1122" dy="0">HOOK: AGENT_TURN</tspan>
  </text>
  <path d="M200 492 H244" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M468 492 H508" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M678 492 H710" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M992 492 H1022" class="flow purple " stroke="#8d75ff" marker-end="url(#arrow-purple)"/>
  <path d="M1202 492 H1236" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M1458 492 H1474" class="flow cyan " stroke="#00d8e8" marker-end="url(#arrow-cyan)"/>
  <path d="M594 298 V436" class="flow cyan slow" stroke="#00d8e8" />
  <path d="M1120 298 V436" class="flow cyan slow" stroke="#00d8e8" />

</svg>
