                      context: "Follow up on proposal"
                    output:
                      call_id: "CALL_7dAb3kR9mXvQ2pLw"
                      call_end_reason: "caller_hangup"
                      start_time: "2026-02-07T05:57:45Z"
                      end_time: "2026-02-07T06:02:30Z"
                      assistant_number: "+911234567890"
                      call_summary: "The agent successfully connected with John Doe and discussed project requirements."
                      duration: 285
                      recording_url: "https://cdn.unpod.dev/recordings/CALL_7dAb3kR9mXvQ2pLw.mp3"
                      transcript:
                        - role: "agent"
                          content: "Hello, this is an AI assistant. Am I speaking with John Doe?"
                        - role: "user"
                          content: "Yes, this is John."
                      post_call_data:
                        summary: "Agent connected with John Doe and discussed project requirements."
                        outcome: "interested"
                        sentiment: "positive"
                      call_type: "outbound"
                      call_status: "completed"
                    attachments: []
                    assignee: "space-agent-8qmk42nslp91wrh3dz7btxc4"
                    status: "completed"
                    execution_type: "call"
                    ref_id: "6902fb5840a736e125e80ebc"
                    failure_count: 0
                    last_failure_reason: null
                    retry_attempt: 0
                    last_status_change: "2026-02-07T06:02:35Z"
                    scheduled_timestamp: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v2/platform/agents/{agent_handle}/executions/:
    get:
      operationId: getAgentExecutions
      summary: Get All Agent Executions
      tags: [Agents]
      security:
        - TokenAuth: []
      parameters:
        - name: agent_handle
          in: path
          required: true
          schema:
            type: string
            example: "space-agent-8qmk42nslp91wrh3dz7btxc4"
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: List of executions for the agent
          content:
            application/json:
              example:
                count: 12
                status_code: 200
                message: "Executions fetched successfully"
                data:
                  - run_id: "Recac64fe03e911f1878d43cd8a99e069"
                    status: "completed"
                    total_tasks: 25
                    completed_tasks: 23
                    created: "2026-02-07T05:57:45Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Tasks / Make Call ────────────────────────────────────────
  /api/v2/platform/spaces/{space_token}/tasks/create/:
    post:
      operationId: createTask
      summary: Create a Task - Make Voice AI Call
      tags: [Tasks]
      security:
        - TokenAuth: []
      parameters:
        - name: space_token
          in: path
          required: true
          schema:
            type: string
            example: "8KZAMRAHSXXXXXXMAYNASMJC"
        - $ref: '#/components/parameters/OrgHandle'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pilot
                - documents
              properties:
                pilot:
                  type: string
                  description: Agent/pilot handle to assign the task
                  example: "space-agent-f1o3qjm1y7q1avvuynv4vprb1"
                documents:
                  type: array
                  description: Array of contact/document objects
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: "John Doe"
                      email:
                        type: string
                        example: "john@example.com"
                      contact_number:
                        type: string
                        example: "1234567890"
                      alternate_number:
                        type: string
                        example: "+919876543210"
                      occupation:
                        type: string
                        example: "Sales Manager"
                      company_name:
                        type: string
                        example: "Acme Corp"
                      address:
                        type: string
                        example: "123 Main St, Mumbai"
                      about:
                        type: string
                        example: "Warm lead from webinar"
                      context:
                        type: string
                        example: "Follow up on proposal sent last week"
                      labels:
                        type: array
                        items:
                          type: string
                        example: ["warm-lead", "webinar"]
                      title:
                        type: string
                        example: "Q1 Outreach"
                      description:
                        type: string
                        example: "Lead from Q1 campaign"
                      document_id:
                        type: string
                        example: "6902fb5840a736e125e80ebc"
                context:
                  type: string
                  description: Additional context for the task
                  example: "Call the lead and discuss the project requirements."
                schedule:
                  type: object
                  description: Schedule configuration
                  example:
                    type: "now"
            example:
              pilot: "space-agent-f1o3qjm1y7q1avvuynv4vprb1"
              context: "Call the lead and discuss the project requirements."
              schedule:
                type: "now"
              documents:
                - name: "John Doe"
                  email: "john@example.com"
                  contact_number: "1234567890"
                  alternate_number: "+919876543210"
                  occupation: "Sales Manager"
                  company_name: "Acme Corp"
                  address: "123 Main St, Mumbai"
                  about: "Warm lead from webinar"
                  context: "Follow up on proposal sent last week"
                  labels: ["warm-lead", "webinar"]
                  title: "Q1 Outreach"
                  description: "Lead from Q1 campaign"
                  document_id: "6902fb5840a736e125e80ebc"
      responses:
        '200':
          description: Task created successfully
          content:
            application/json:
              example:
                status_code: 200
                message: "Task Created Successfully"
                data:
                  run_id: "R74802366fe9011f0878d43cd8a99e069"
                  task_ids:
                    - "T74802367fe9011f0878d43cd8a99e069"
                  status: "pending"
        '206':
          description: Partial Content - Business logic error
          content:
            application/json:
              example:
                message: "Task creation failed"
                errors: "Detailed error description"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Runs ─────────────────────────────────────────────────────
  /api/v2/platform/spaces/{space_token}/runs/:
    get:
      operationId: getAllRuns
      summary: Get All Runs in a Space
      tags: [Runs]
      security:
        - TokenAuth: []
      parameters:
        - name: space_token
          in: path
          required: true
          schema:
            type: string
            example: "8KZAMRAHSXXXXXXMAYNASMJC"
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: List of all runs
          content:
            application/json:
              example:
                count: 9
                status_code: 200
                message: "Runs Fetched Successfully"
                data:
                  - run_id: "Recac64fe03e911f1878d43cd8a99e069"
                    collection_ref: "collection_data_SA2W8R6NZRK6C9PO3JSL1J85"
                    run_mode: "prefect"
                    status: "completed"
                    created: "2026-02-07T05:57:45Z"
                    modified: "2026-02-07T05:57:45Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/platform/spaces/{space_token}/runs/{run_id}/tasks/:
    get:
      operationId: getRunTasks
      summary: Get Detailed Tasks for a Specific Run
      tags: [Runs]
      security:
        - TokenAuth: []
      parameters:
        - name: space_token
          in: path
          required: true
          schema:
            type: string
            example: "8KZAMRAHSXXXXXXMAYNASMJC"
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            example: "Recac64fe03e911f1878d43cd8a99e069"
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: List of tasks for the run
          content:
            application/json:
              example:
                count: 9
                status_code: 200
                message: "Tasks Fetched Successfully"
                data:
                  - _id: "697debb84c27faa892bfa0cc"
                    thread_id: "thread_9xkL2mQpR7vNwY4sZ3cJ8hF1"
                    user_info:
                      email: "user@example.com"
                      full_name: "John Doe"
                    task_id: "T8ff2ccdffe9a11f0878d43cd8a99e069"
                    run_id: "Recac64fe03e911f1878d43cd8a99e069"
                    task:
                      objective: "Call the lead and discuss the project requirements."
                    input:
                      name: "John Doe"
                      contact_number: "1234567890"
                      email: "john@example.com"
                      context: "Follow up on proposal"
                    output:
                      call_id: "CALL_7dAb3kR9mXvQ2pLw"
                      start_time: "2026-02-07T05:57:45Z"
                      end_time: "2026-02-07T06:02:30Z"
                      duration: 285
                      recording_url: "https://cdn.unpod.dev/recordings/CALL_7dAb3kR9mXvQ2pLw.mp3"
                      transcript:
                        - role: "agent"
                          content: "Hello, this is an AI assistant. Am I speaking with John Doe?"
                        - role: "user"
                          content: "Yes, this is John."
                      post_call_data:
                        summary: "Agent connected with John Doe and discussed project requirements."
                        outcome: "interested"
                        sentiment: "positive"
                      call_type: "outbound"
                      call_status: "completed"
                    assignee: "space-agent-8qmk42nslp91wrh3dz7btxc4"
                    status: "completed"
                    execution_type: "call"
                    created: "2026-02-07T05:57:45Z"
                    modified: "2026-02-07T06:02:35Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Call Logs ────────────────────────────────────────────────
  /api/v2/platform/call-logs/:
    get:
      operationId: getCallLogs
      summary: Get Call Logs
      tags: [Call Logs]
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgHandle'
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: page_size
          in: query
          schema:
            type: integer
            example: 20
        - name: start_date
          in: query
          schema:
            type: string
            example: "2026-02-01"
        - name: end_date
          in: query
          schema:
            type: string
            example: "2026-02-07"
        - name: call_type
          in: query
          schema:
            type: string
            enum: [inbound, outbound]
            example: outbound
        - name: call_status
          in: query
          schema:
            type: string
            enum: [completed, missed, failed]
            example: completed
      responses:
        '200':
          description: List of call logs
          content:
            application/json:
              example:
                count: 150
                status_code: 200
                message: "Call logs fetched successfully"
                data:
                  - source_number: "+911234567890"
                    destination_number: "+919876543210"
                    call_type: "outbound"
                    call_status: "completed"
                    creation_time: "2026-02-07T05:57:00Z"
                    start_time: "2026-02-07T05:57:45Z"
                    end_time: "2026-02-07T06:01:12Z"
                    call_duration: 207
                    end_reason: "caller_hangup"
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Analytics ────────────────────────────────────────────────
  /api/v2/platform/organisation/analytics/:
    get:
      operationId: getAnalytics
      summary: Get Analytics
      tags: [Analytics]
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgHandle'
        - name: space_token
          in: query
          schema:
            type: string
            example: "8KZAMRAHSXXXXXXMAYNASMJC"
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              example:
                status_code: 200
                message: "Analytics fetched successfully"
                data:
                  total_calls: 1250
                  completed_calls: 987
                  failed_calls: 143
                  avg_duration_seconds: 145.3
                  total_tasks: 1350
                  task_status_breakdown:
                    pending: 45
                    running: 12
                    completed: 1180
                    failed: 113
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Providers ────────────────────────────────────────────────
  /api/v2/platform/telephony/providers/:
    get:
      operationId: getTelephonyProviders
      summary: Get Telephony Providers
      tags: [Providers]
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: List of available telephony providers
          content:
            application/json:
              example:
                status_code: 200
                message: "Voice infra providers fetched successfully."
                data:
                  - id: 1
                    name: "Twilio"
                    slug: "twilio"
                  - id: 2
                    name: "Plivo"
                    slug: "plivo"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/platform/telephony/providers-configurations/:
    get:
      operationId: getAllProviders
      summary: Get All Providers
      tags: [Providers]
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: List of provider configurations
          content:
            application/json:
              example:
                status_code: 200
                message: "Provider configurations fetched successfully."
                data:
                  - id: 42
                    provider: "twilio"
                    account_sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                    created_at: "2026-02-07T10:00:00Z"
                  - id: 43
                    provider: "plivo"
                    account_sid: "MAyyyyyyyyyyyyyyyyyyyyyyy"
                    created_at: "2026-02-10T09:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createProvider
      summary: Create Provider
      tags: [Providers]
      security:
        - TokenAuth: []
      parameters:
        - $ref: '#/components/parameters/OrgHandle'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - account_sid
                - auth_token
              properties:
                provider:
                  type: string
                  example: "twilio"
                account_sid:
                  type: string
                  example: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                auth_token:
                  type: string
                  example: "your_auth_token_here"
            example:
              provider: "twilio"
              account_sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
              auth_token: "your_auth_token_here"
      responses:
        '201':
          description: Provider created
          content:
            application/json:
              example:
                status_code: 201
                message: "Provider configuration created successfully."
                data:
                  id: 42
                  provider: "twilio"
                  account_sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                  created_at: "2026-02-07T10:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/platform/telephony/providers-configurations/{id}/:
    get:
      operationId: getProviderById
      summary: Get Provider by ID
      tags: [Providers]
      security:
        - TokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 42
        - $ref: '#/components/parameters/OrgHandle'
      responses:
        '200':
          description: Provider configuration details
          content:
            application/json:
              example:
                status_code: 200
                message: "Provider configuration fetched successfully."
                data:
                  id: 42
                  provider: "twilio"
                  account_sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                  created_at: "2026-02-07T10:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateProvider
      summary: Update Provider
      tags: [Providers]
      security:
        - TokenAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 42
        - $ref: '#/components/parameters/OrgHandle'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth_token:
                  type: string
                  example: "your_new_auth_token_here"
                account_sid:
                  type: string
                  example: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
            example:
              auth_token: "your_new_auth_token_here"
      responses:
        '200':
          description: Provider updated
          content:
            application/json:
              example:
                status_code: 200
                message: "Provider configuration updated successfully."
                data:
                  id: 42
                  provider: "twilio"
                  account_sid: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
