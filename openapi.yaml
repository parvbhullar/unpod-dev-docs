components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Format: Token <your-api-key>"

  parameters:
    OrgHandle:
      name: Org-Handle
      in: header
      required: true
      schema:
        type: string
        example: "unpod.tv"
      description: "Organization domain handle"

  responses:
    Unauthorized:
      description: Unauthorized - Invalid or missing API token
      content:
        application/json:
          example:
            status_code: 401
            message: "Authentication credentials were not provided."
    NotFound:
      description: Resource not found
      content:
        application/json:
          example:
            status_code: 404
            message: "Not found."